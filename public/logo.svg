<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCD34D;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="#0a0a0a" stroke="url(#goldGradient)" stroke-width="2"/>
  
  <!-- Ethereum Diamond Shape -->
  <g filter="url(#glow)">
    <!-- Top Triangle -->
    <path d="M 50 25 L 35 52 L 50 60 Z" fill="url(#goldGradient)" opacity="0.8"/>
    <path d="M 50 25 L 65 52 L 50 60 Z" fill="url(#goldGradient)" opacity="0.6"/>
    
    <!-- Bottom Triangle -->
    <path d="M 50 65 L 35 52 L 50 75 Z" fill="url(#goldGradient)" opacity="0.9"/>
    <path d="M 50 65 L 65 52 L 50 75 Z" fill="url(#goldGradient)" opacity="0.7"/>
  </g>
  
  <!-- Center Line Highlight -->
  <line x1="50" y1="25" x2="50" y2="75" stroke="#FCD34D" stroke-width="1" opacity="0.5"/>
</svg>
